version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: naviaid_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-naviaid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-naviaid_secret}
      POSTGRES_DB: ${POSTGRES_DB:-naviaid}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-naviaid}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - naviaid-net

  redis:
    image: redis:7-alpine
    container_name: naviaid_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - naviaid-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naviaid_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-naviaid}:${POSTGRES_PASSWORD:-naviaid_secret}@postgres:5432/${POSTGRES_DB:-naviaid}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    networks:
      - naviaid-net
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: naviaid_celery
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-naviaid}:${POSTGRES_PASSWORD:-naviaid_secret}@postgres:5432/${POSTGRES_DB:-naviaid}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    networks:
      - naviaid-net
    command: celery -A app.celery_app worker --loglevel=info

  frontend:
    image: node:20-alpine
    container_name: naviaid_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - naviaid-net
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  redis_data:
  model_cache:

networks:
  naviaid-net:
    driver: bridge
